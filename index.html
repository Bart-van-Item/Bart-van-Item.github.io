<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="0.2; url=pages/home/home.html" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bart van Item - Portfolio</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(239, 109, 63, 0.22), transparent 28%),
        radial-gradient(circle at 80% 18%, rgba(19, 137, 122, 0.18), transparent 24%),
        linear-gradient(145deg, #faf4ec 0%, #f2e8db 48%, #f9f2ea 100%);
      color: #11223a;
    }

    .loader {
      padding: 1.4rem 1.7rem;
      border: 1px solid rgba(17, 34, 58, 0.08);
      border-radius: 1.4rem;
      background: rgba(255, 249, 241, 0.78);
      box-shadow: 0 24px 70px rgba(17, 34, 58, 0.12);
      text-align: center;
      backdrop-filter: blur(14px);
    }

    .loader p {
      margin: 0;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="loader">
    <p>Opening portfolio...</p>
  </div>
</body>
</html>
